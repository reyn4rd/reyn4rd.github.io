<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHR - Diversão Simples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }

        h1 {
            margin-top: 50px;
            color: #333;
        }

        p {
            color: #666;
            margin: 20px auto;
            font-size: 18px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
        }

        button:hover {
            background-color: #45a049;
        }

        #dog-container {
            margin-top: 30px;
            display: none;
        }

        #dog {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto;
            background: url('https://cdn-icons-png.flaticon.com/512/194/194279.png') no-repeat center;
            background-size: contain;
        }

        #poop {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background-color: brown;
            border-radius: 50%;
            display: none;
            animation: poop-drop 1s ease-in-out forwards;
        }

        @keyframes poop-drop {
            from {
                top: 120px;
                opacity: 0;
            }
            to {
                top: 150px;
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <h1>Bem-vindo ao KHR</h1>
    <p>Clique no botão abaixo para se divertir com nosso cachorro!</p>

    <button onclick="showDog()">Clique Aqui</button>

    <div id="dog-container">
        <div id="dog"></div>
        <div id="poop"></div>
    </div>

    <script>
        function showDog() {
            const dogContainer = document.getElementById('dog-container');
            const poop = document.getElementById('poop');

            dogContainer.style.display = 'block';
            poop.style.display = 'block';
        }
    </script>
</body>
</html>
